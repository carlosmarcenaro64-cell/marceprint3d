<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarcePrint3D | Sistema de Gestión Carlos Manuel Panameño Marcenaro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa: #ff5d8f;
            --rosa-glow: rgba(255, 93, 143, 0.4);
            --gris: #2d3436;
            --bg: #f0f2f5;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1a1a1a;
            --img-bg: #e9ecef;
            --ai-color: #8e44ad;
            --header-bg: rgba(255, 255, 255, 0.95);
            --cat-btn-bg: var(--gris);
            --cat-btn-text: #ffffff;
            --badge-bg: var(--gris);
            --badge-text: #ffffff;
            --select-bg: #ffffff;
            --select-text: #1a1a1a;
            --stat-color: #636e72;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --white: #1a1a1a;
            --card-bg: rgba(30, 30, 30, 0.8);
            --text: #f5f5f5;
            --gris: #f5f5f5;
            --img-bg: #2d2d2d;
            --header-bg: rgba(20, 20, 20, 0.95);
            --cat-btn-bg: #e0e0e0; 
            --cat-btn-text: #1a1a1a; 
            --badge-bg: #e0e0e0;
            --badge-text: #1a1a1a;
            --select-bg: #e0e0e0;
            --select-text: #1a1a1a;
            --stat-color: #b2bec3;
        }

        /* --- ANIMACIÓN DE CARGA --- */
        #preloader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .printer-frame {
            width: 300px;
            height: 220px;
            border: 4px solid var(--gris);
            border-bottom: 8px solid var(--gris);
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .extruder-head {
            position: absolute;
            width: 40px;
            height: 30px;
            background: #444;
            top: 20px;
            left: 0;
            animation: printMovement 4s infinite linear;
            z-index: 5;
        }

        .extruder-head::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 4px;
            height: 8px;
            background: var(--rosa);
            transform: translateX(-50%);
        }

        .printed-logo {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--rosa);
            height: 0;
            overflow: hidden;
            animation: logoRise 4s infinite linear;
            white-space: nowrap;
        }

        @keyframes printMovement {
            0% { left: 0; top: 160px; }
            25% { left: 240px; top: 140px; }
            50% { left: 0; top: 100px; }
            75% { left: 240px; top: 60px; }
            100% { left: 120px; top: 20px; }
        }

        @keyframes logoRise {
            0% { height: 0; opacity: 0; }
            100% { height: 60px; opacity: 1; }
        }

        /* --- INTERFAZ PRINCIPAL --- */
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            transition: 0.4s ease;
        }

        header {
            background: var(--header-bg);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 900;
            backdrop-filter: blur(10px);
        }

        .theme-control {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        #themeToggleBtn {
            background: transparent;
            border: 2px solid var(--rosa);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--rosa);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #themeToggleBtn:hover {
            background: var(--rosa);
            color: white;
            box-shadow: 0 0 15px var(--rosa-glow);
        }

        /* --- LOGO ANIMADO --- */
        .logo-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-container:hover {
            transform: scale(1.05);
            animation: motorHum 0.1s infinite;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(
                90deg, 
                var(--gris) 0%, 
                var(--rosa) 45%, 
                #ff85a1 50%, 
                var(--rosa) 55%, 
                var(--gris) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            animation: filamentFlow 5s linear infinite;
            position: relative;
        }

        @keyframes filamentFlow { to { background-position: 200% center; } }

        /* --- FILTROS Y CONTROLES --- */
        .controls-area {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .sort-select {
            background: var(--select-bg);
            border: 1px solid var(--rosa);
            color: var(--select-text);
            padding: 5px 15px;
            border-radius: 10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 30px 5%;
            max-width: 1400px;
            margin: auto;
        }

        /* --- CARDS --- */
        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.4s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--rosa);
            box-shadow: 0 15px 35px var(--rosa-glow);
        }

        .img-container {
            width: 100%;
            height: 220px;
            background: var(--img-bg);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: 0.5s;
        }

        .tech-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 4px 10px;
            border-radius: 8px;
            margin-right: 5px;
            display: inline-block;
            transition: 0.3s;
        }

        .print-stats {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 0.75rem;
            color: var(--stat-color);
            font-weight: 600;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--rosa);
            margin: 10px 0;
        }

        /* BOTONES */
        .btn {
            background: var(--rosa);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-family: 'Outfit', sans-serif;
            transition: 0.3s;
        }

        .btn-cat {
            background: var(--cat-btn-bg);
            color: var(--cat-btn-text);
        }

        .btn:hover { filter: brightness(1.1); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            max-width: 500px;
            margin: auto;
            border-radius: 35px;
            padding: 30px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            color: var(--text);
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--rosa);
            border-radius: 22px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--rosa-glow);
            z-index: 1000;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gris);
            width: 25px;
            height: 25px;
            border-radius: 50%;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

    </style>
</head>
<body data-theme="light">

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="printer-frame">
            <div class="extruder-head"></div>
            <div class="printed-logo">MarcePrint3D</div>
        </div>
        <p style="margin-top: 20px; font-weight: 600; letter-spacing: 3px; color: var(--gris)">CALIBRANDO CAPAS...</p>
    </div>

    <header>
        <div class="theme-control">
            <button id="themeToggleBtn" onclick="toggleTheme()">Modo Oscuro</button>
        </div>
        
        <div class="logo-container">
            <h1 class="logo-text">MarcePrint3D</h1>
        </div>

        <div class="controls-area">
            <div id="categorias" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
            <div>
                <label id="orderLabel" style="font-size: 0.8rem; font-weight: 600; margin-right: 10px;">ORDENAR POR PRECIO:</label>
                <select class="sort-select" id="priceSorter" onchange="handleSortChange()">
                    <option value="default">Relevancia</option>
                    <option value="low-high">Menor a Mayor</option>
                    <option value="high-low">Mayor a Menor</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container" id="vitrina"></main>

    <div class="fab" onclick="verCarrito()">
        🛒 <span class="cart-badge" id="cartCount">0</span>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <script>
        const apiKey = "";
        const SHEET_API = "https://script.google.com/macros/s/AKfycbwg0FPhLnxUEVc5iHhL4Rm-8TnvrytwlnRJxhHoLJeKPicGiKByza8EFglnSObzXb9c/exec";
        const WA_PHONE = "50377190952";
        
        let inventory = [];
        let filteredInventory = [];
        let cart = [];
        let currentCategory = "Todo";

        window.onload = async () => {
            await loadData();
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                if(loader) loader.style.opacity = '0';
                setTimeout(() => loader?.remove(), 800);
            }, 3000);
        };

        async function loadData() {
            try {
                const res = await fetch(SHEET_API);
                inventory = await res.json();
                filteredInventory = [...inventory];
                renderCategories();
                renderInventory();
            } catch (e) { console.error("Error crítico Carlos.", e); }
        }

        function renderCategories() {
            const cats = [...new Set(inventory.map(p => p.categoria))];
            const div = document.getElementById('categorias');
            div.innerHTML = `<button class="btn btn-cat" style="width:auto; padding:5px 15px;" onclick="filterByCat('Todo')">Todo</button>` + 
                cats.map(c => `<button class="btn btn-cat" style="width:auto; padding:5px 15px;" onclick="filterByCat('${c}')">${c}</button>`).join('');
        }

        function filterByCat(cat) {
            currentCategory = cat;
            handleSortChange(); 
        }

        function handleSortChange() {
            const sortVal = document.getElementById('priceSorter').value;
            let result = currentCategory === "Todo" 
                ? [...inventory] 
                : inventory.filter(p => p.categoria === currentCategory);

            if(sortVal === "low-high") {
                result.sort((a, b) => parseFloat(a.precio) - parseFloat(b.precio));
            } else if(sortVal === "high-low") {
                result.sort((a, b) => parseFloat(b.precio) - parseFloat(a.precio));
            }

            filteredInventory = result;
            renderInventory();
        }

        function renderInventory() {
            const container = document.getElementById('vitrina');
            container.innerHTML = filteredInventory.map((p) => {
                const globalIndex = inventory.indexOf(p);
                return `
                <div class="card" onclick="openDetails(${globalIndex})">
                    <div class="img-container">
                        <img src="${p.imagen}" alt="${p.nombre}">
                    </div>
                    <div style="flex:1">
                        <span class="tech-badge">${p.categoria}</span>
                        <h3 style="margin:10px 0 5px 0; font-family:'Outfit'">${p.nombre}</h3>
                        <p style="font-size:0.8rem; opacity:0.7;">${p.descripcion_corta}</p>
                        <div class="print-stats">
                            <div class="stat-item">⏱ ${p.tiempo || 'N/A'}</div>
                            <div class="stat-item">⚖ ${p.gramos || '0'}g</div>
                        </div>
                    </div>
                    <div class="price">$${p.precio}</div>
                    <button class="btn">Configurar</button>
                </div>
            `}).join('');
        }

        function openDetails(idx) {
            const p = inventory[idx];
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <span onclick="closeModal()" style="position:absolute; right:25px; top:20px; font-size:1.5rem; cursor:pointer;">✕</span>
                <img src="${p.imagen}" style="width:100%; height:250px; object-fit:contain; border-radius:20px;">
                <h2 style="font-family:'Outfit'; margin:20px 0 10px 0;">${p.nombre}</h2>
                <div class="print-stats" style="font-size:1rem; margin-bottom:15px;">
                    <div class="stat-item">⏱ Tiempo estimado: ${p.tiempo || 'N/A'}</div>
                    <div class="stat-item">⚖ Material: ${p.gramos || '0'}g</div>
                </div>
                <p>${p.descripcion_completa}</p>
                <div class="price">$${p.precio}</div>
                <button class="btn" onclick="addToCart(${idx})">Añadir al Carrito</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function addToCart(idx) {
            cart.push(inventory[idx]);
            document.getElementById('cartCount').innerText = cart.length;
            closeModal();
        }

        function verCarrito() {
            if(cart.length === 0) return;
            const body = document.getElementById('modalBody');
            let total = cart.reduce((acc, item) => acc + parseFloat(item.precio), 0);
            
            body.innerHTML = `
                <h2 style="font-family:'Outfit'">Pedido de Carlos</h2>
                <div style="max-height:300px; overflow-y:auto;">
                    ${cart.map((item, i) => `
                        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
                            <span>${item.nombre}</span>
                            <span>$${item.precio}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="price" style="text-align:right; margin-top:20px;">Total: $${total.toFixed(2)}</div>
                <button class="btn" style="margin-top:20px;" onclick="sendOrder()">Confirmar WhatsApp</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder() {
            let msg = `*MARCEPRINT3D - PEDIDO*\nCliente: Carlos Manuel Panameño Marcenaro\n\n`;
            cart.forEach(i => msg += `• ${i.nombre} - $${i.precio}\n`);
            window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerText = isDark ? 'Modo Oscuro' : 'Modo Claro';
        }

        window.onclick = (e) => { if(e.target.id === 'modal') closeModal(); }
    </script>
</body>
</html>
